# docker-compose.yml
# Runs a local PostgreSQL database for development.
#
#   Start it:  docker compose up -d
#   Logs:      docker compose logs -f db
#   Stop it:   docker compose down          (keeps your data)
#   Wipe it:   docker compose down -v        (also deletes the data volume)
#
# The ${DB_PASSWORD} below is read from your .env file in this folder
# (copy .env.example to .env first). Compose substitutes it automatically.

services:
  db:
    image: postgres:16
    container_name: securetransfer-db
    environment:
      POSTGRES_DB: securetransfer
      POSTGRES_USER: securetransfer
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      # host:container. Exposed on localhost:5433 (not 5432) to avoid clashing
      # with a native Postgres already listening on 5432 on this machine.
      # The container still speaks Postgres on its internal 5432.
      - "5433:5432"
    volumes:
      # named volume so your data survives "docker compose down" / restarts
      - securetransfer_pgdata:/var/lib/postgresql/data
    healthcheck:
      # marks the container "healthy" only once Postgres is actually ready
      test: ["CMD-SHELL", "pg_isready -U securetransfer -d securetransfer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  securetransfer_pgdata:
