# application.yml
# Central configuration for the Spring Boot app. Replaces the generated
# application.properties (YAML is easier to read once config grows).

spring:
  application:
    name: securetransfer-api

  # --- JSON serialization (Jackson) ---
  # Render all timestamps in UTC so API responses are consistent regardless of
  # the server's local time zone. Without this, an OffsetDateTime fresh from the
  # JVM shows the local offset (e.g. -07:00) while one read back from Postgres
  # shows Z (UTC) — same instant, but inconsistent text. UTC everywhere fixes it.
  jackson:
    time-zone: UTC

  # --- Database connection ---
  # Must match the credentials in docker-compose.yml. The password is read
  # from the DB_PASSWORD environment variable and is intentionally NOT given
  # a default, so the app fails fast with a clear error if you forget to set
  # it — secrets never live in this file. (See .env.example.)
  datasource:
    url: jdbc:postgresql://localhost:5433/securetransfer   # 5433 -> docker-compose Postgres (5432 is a local native Postgres)
    username: securetransfer
    password: ${DB_PASSWORD}

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      # Flyway owns the schema. Hibernate must NOT create or alter tables;
      # "validate" only checks that our entities line up with the DB schema.
      ddl-auto: validate
    # Keep the DB session out of the web layer — avoids accidental lazy-load
    # queries while rendering responses. Good default for an API.
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # --- Flyway database migrations ---
  # Flyway runs the SQL files in db/migration on startup, in version order,
  # applying each one exactly once and recording it in a flyway_schema_history
  # table.
  flyway:
    enabled: true
    locations: classpath:db/migration

# --- Application-specific settings ---
app:
  jwt:
    # HS256 signing secret — MUST be at least 32 characters. Read from the
    # environment with NO default, so the app fails fast if JWT_SECRET is unset.
    # Never commit it. (See .env.example.)
    secret: ${JWT_SECRET}
    expiration-minutes: 60
  seed:
    # Passwords for the seeded staff logins (admin / teller). Read from the
    # environment with NO default — like JWT_SECRET, the app fails fast if these
    # are unset rather than ever baking a usable credential into committed config.
    admin-password: ${ADMIN_PASSWORD}
    teller-password: ${TELLER_PASSWORD}
