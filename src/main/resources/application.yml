# application.yml
# Central configuration for the Spring Boot app. Replaces the generated
# application.properties (YAML is easier to read once config grows).

# Listen on the platform-provided port when present (e.g. Render sets PORT),
# else default to 8080 for local dev.
server:
  port: ${PORT:8080}

# --- Actuator (operational endpoints) ---
# Expose ONLY health + info publicly. Render points its health check at
# /actuator/health, so a failed startup (or a lost DB connection) marks the
# deploy unhealthy instead of silently serving errors. /actuator/info reports the
# deployed commit (from Render's RENDER_GIT_COMMIT) so a deploy can be *verified*
# as running the exact commit that was pushed. show-details=never keeps the public
# health response to a bare UP/DOWN — no internals leaked.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true         # expose the info.* properties below

info:
  app:
    name: securetransfer-api
  git:
    # Render sets these at runtime for a git-backed service; 'local' off-platform.
    commit: ${RENDER_GIT_COMMIT:local}
    branch: ${RENDER_GIT_BRANCH:local}

spring:
  application:
    name: securetransfer-api

  # --- JSON serialization (Jackson) ---
  # Render all timestamps in UTC so API responses are consistent regardless of
  # the server's local time zone. Without this, an OffsetDateTime fresh from the
  # JVM shows the local offset (e.g. -07:00) while one read back from Postgres
  # shows Z (UTC) — same instant, but inconsistent text. UTC everywhere fixes it.
  jackson:
    time-zone: UTC

  # --- Database connection ---
  # Host/port/name/user come from the environment with LOCAL defaults baked in,
  # so local dev (docker-compose) just works while a deployed host (e.g. Render's
  # managed Postgres) overrides them via DB_HOST/DB_PORT/DB_NAME/DB_USERNAME. The
  # password has NO default, so the app fails fast if DB_PASSWORD is unset —
  # secrets never live in this file. (See .env.example.)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:securetransfer}
    username: ${DB_USERNAME:securetransfer}
    password: ${DB_PASSWORD}

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      # Flyway owns the schema. Hibernate must NOT create or alter tables;
      # "validate" only checks that our entities line up with the DB schema.
      ddl-auto: validate
    # Keep the DB session out of the web layer — avoids accidental lazy-load
    # queries while rendering responses. Good default for an API.
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # --- Flyway database migrations ---
  # Flyway runs the SQL files in db/migration on startup, in version order,
  # applying each one exactly once and recording it in a flyway_schema_history
  # table.
  flyway:
    enabled: true
    locations: classpath:db/migration

# --- Application-specific settings ---
app:
  jwt:
    # HS256 signing secret — MUST be at least 32 characters. Read from the
    # environment with NO default, so the app fails fast if JWT_SECRET is unset.
    # Never commit it. (See .env.example.)
    secret: ${JWT_SECRET}
    expiration-minutes: 60
  # --- CORS: which browser origins may call this API (Phase 9 frontend) ---
  # Comma-separated. Defaults cover the local Vite dev server AND the deployed
  # Vercel demo; override with the CORS_ALLOWED_ORIGINS env var to add more.
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,https://securetransfer-demo.vercel.app,https://securetransfer-demo-frank-ans-projects.vercel.app}
  seed:
    # Passwords for the seeded staff logins (admin / teller). Read from the
    # environment with NO default — like JWT_SECRET, the app fails fast if these
    # are unset rather than ever baking a usable credential into committed config.
    admin-password: ${ADMIN_PASSWORD}
    teller-password: ${TELLER_PASSWORD}
    # A TELLER login for the PUBLIC demo. This one INTENTIONALLY has a committed
    # default because it is meant to be public: a TELLER cannot freeze accounts,
    # read the audit log, or manage users (all ADMIN-only), so exposure is limited
    # to throwaway demo data. Set DEMO_PASSWORD to blank to disable seeding it.
    demo-password: ${DEMO_PASSWORD:demopass123}
  # --- Fraud flagging rules (Phase 6) ---
  fraud:
    large-amount-threshold: 10000.00   # flag transfers at/above this amount
    velocity-window-minutes: 60        # window for the velocity rule + stats
    velocity-max-transfers: 3          # flag when the sender already has >= this many in the window
    # Structuring ("smurfing"): repeated sends kept just under the large-amount line.
    structuring-proximity-ratio: 0.20  # "near threshold" = within 20% below the line -> band [8000, 10000)
    structuring-min-transfers: 3       # flag once the sender has >= this many near-threshold sends (incl. current) in the window
  # --- Fraud-triage agent (Phase 6) ---
  anthropic:
    # API key from the environment. Blank → the agent runs in a deterministic
    # rules-based FALLBACK mode (no model call), so the system works without a key.
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-haiku-4-5-20251001
    max-tokens: 1024
    max-tool-iterations: 5
