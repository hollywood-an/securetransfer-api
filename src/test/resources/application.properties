# Test-only configuration.
#
# During tests the real database is supplied by Testcontainers (see
# TestcontainersConfiguration + @ServiceConnection), which overrides the
# datasource URL/username/password at runtime. This dummy password just
# satisfies property binding so the test context starts without needing the
# real DB_PASSWORD environment variable set.
spring.datasource.password=test

# Dummy JWT secret for tests (HS256 requires >= 32 characters). The real one
# comes from the JWT_SECRET environment variable in dev/prod.
app.jwt.secret=test-only-jwt-secret-key-please-change-min-32-bytes

# Seed staff passwords for tests (required in app config; no committed defaults).
app.seed.admin-password=test-admin-password
app.seed.teller-password=test-teller-password
